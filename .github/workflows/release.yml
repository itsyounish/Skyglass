name: Release to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      # The lockfile is generated on macOS, which omits Linux-only
      # optional deps like @rollup/rollup-linux-x64-gnu (npm/cli#4828).
      # Regenerating on the runner resolves the correct platform binding.
      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
