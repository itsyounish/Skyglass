name: Feature Request
description: Suggest a new feature or improvement for skyglass
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea clearly so the community can discuss it.

  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: What problem does this feature solve? Is this related to a frustration?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like. Be as specific as possible.
      placeholder: "I would like skyglass to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or features you've considered.
      placeholder: "I also thought about..."
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which area of skyglass does this affect?
      options:
        - Graph visualization
        - AWS provider
        - Azure provider
        - GCP provider
        - CLI
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, mockups, or screenshots about the feature request.
    validations:
      required: false
