name: Bug Report
description: Report a bug or unexpected behavior in skyglass
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `npx skyglass-cli --provider aws`
        2. Wait for the graph to render
        3. Click on a node
        4. See error in console
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you using?
      placeholder: "e.g. macOS 15.2, Ubuntu 24.04, Windows 11"
    validations:
      required: true

  - type: dropdown
    id: node-version
    attributes:
      label: Node.js version
      description: Which Node.js version are you running?
      options:
        - "20.x"
        - "22.x"
        - "24.x"
        - "Other (specify in description)"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Cloud provider
      description: Which cloud provider were you using when the bug occurred?
      options:
        - AWS
        - Azure
        - GCP
        - Demo mode (no provider)
        - Multiple providers
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: skyglass version
      description: "Check the banner printed on startup, or your installed `package.json`."
      placeholder: "e.g. 0.1.0"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, drag and drop screenshots to help explain the problem.
      placeholder: Drag and drop images here...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context about the problem (logs, config files, etc.).
    validations:
      required: false
